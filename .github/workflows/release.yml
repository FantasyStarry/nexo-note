name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: nexo.exe
            asset: nexo-windows-x86_64.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: nexo
            asset: nexo-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: nexo
            asset: nexo-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: nexo
            asset: nexo-macos-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mv artifacts/nexo-windows-x86_64.exe/nexo.exe release-assets/nexo-windows-x86_64.exe
          mv artifacts/nexo-linux-x86_64/nexo release-assets/nexo-linux-x86_64
          mv artifacts/nexo-macos-x86_64/nexo release-assets/nexo-macos-x86_64
          mv artifacts/nexo-macos-aarch64/nexo release-assets/nexo-macos-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
